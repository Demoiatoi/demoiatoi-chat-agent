<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente de Ventas – De Moi à Toi Regalos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#4a7fa5;--rose-light:#b8d4e8;--rose-dark:#2c5f7a;
  --cream:#f0f5f9;--sand:#dceaf3;--warm-gray:#6b8fa3;
  --dark:#1a2e3a;--white:#ffffff;
  --shadow:0 8px 32px rgba(45,35,32,.12);
  --radius:18px;--radius-sm:10px;
  --font-display:'Playfair Display',serif;--font-body:'DM Sans',sans-serif;
}
body{font-family:var(--font-body);background:var(--cream);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
.demo-header{text-align:center;margin-bottom:24px;max-width:560px}
.demo-header h1{font-family:var(--font-display);font-size:1.9rem;color:var(--dark);margin-bottom:8px}
.demo-header h1 em{color:var(--rose);font-style:italic}
.demo-header p{color:var(--warm-gray);font-size:.9rem;line-height:1.6}

.chat-widget{width:100%;max-width:420px;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow),0 2px 8px rgba(232,131,122,.15);display:flex;flex-direction:column;overflow:hidden;height:620px;position:relative}
.chat-header{background:linear-gradient(135deg,var(--rose-dark) 0%,var(--rose) 100%);padding:18px 20px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.avatar-wrap{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:1.25rem;border:2px solid rgba(255,255,255,.4);flex-shrink:0;position:relative}
.avatar-wrap::after{content:'';position:absolute;bottom:1px;right:1px;width:9px;height:9px;background:#4ade80;border-radius:50%;border:2px solid var(--rose)}
.chat-header-info{flex:1;min-width:0}
.chat-header-info strong{display:block;color:var(--white);font-size:.95rem;font-weight:600;font-family:var(--font-display)}
.chat-header-info span{color:rgba(255,255,255,.78);font-size:.75rem}
.header-badge{background:rgba(255,255,255,.2);color:var(--white);font-size:.68rem;padding:3px 9px;border-radius:20px;border:1px solid rgba(255,255,255,.3);flex-shrink:0}
.messages-area{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.messages-area::-webkit-scrollbar{width:4px}
.messages-area::-webkit-scrollbar-thumb{background:var(--rose-light);border-radius:4px}
.bubble-row{display:flex;align-items:flex-end;gap:8px;animation:slideIn .28s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bubble-row.user{flex-direction:row-reverse}
.bubble-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--rose-light),var(--rose));display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
.bubble-row.user .bubble-avatar{background:linear-gradient(135deg,#dde8f5,#a0b4cc)}
.bubble{max-width:82%;padding:11px 15px;border-radius:18px;font-size:.875rem;line-height:1.55;word-break:break-word}
.bubble-row.agent .bubble{background:var(--sand);color:var(--dark);border-bottom-left-radius:5px}
.bubble-row.user .bubble{background:linear-gradient(135deg,var(--rose-dark),var(--rose));color:var(--white);border-bottom-right-radius:5px}
.bubble-time{font-size:.65rem;color:var(--warm-gray);margin-top:4px}

.quick-replies{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
.qr-btn{background:var(--white);border:1.5px solid var(--rose-light);color:var(--rose-dark);padding:6px 13px;border-radius:20px;font-size:.78rem;cursor:pointer;font-family:var(--font-body);font-weight:500;transition:background .18s,border-color .18s,transform .12s;white-space:nowrap}
.qr-btn:hover{background:var(--rose-light);border-color:var(--rose);transform:translateY(-1px)}

.typing-indicator{display:flex;align-items:center;gap:5px;padding:11px 15px;background:var(--sand);border-radius:18px;border-bottom-left-radius:5px;width:fit-content}
.typing-dot{width:6px;height:6px;background:var(--warm-gray);border-radius:50%;animation:typingBounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}

.input-area{padding:14px 16px 16px;background:var(--white);border-top:1.5px solid var(--sand);flex-shrink:0}
.input-row{display:flex;gap:10px;align-items:flex-end}
.chat-input{flex:1;border:1.5px solid var(--sand);border-radius:24px;padding:10px 16px;font-size:.875rem;font-family:var(--font-body);color:var(--dark);background:var(--cream);outline:none;resize:none;max-height:96px;min-height:42px;line-height:1.5}
.send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--rose-dark),var(--rose));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white}

.andrea-bar{padding:10px 16px;background:var(--white);border-top:1.5px solid var(--sand);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.andrea-btn{display:flex;align-items:center;gap:8px;background:transparent;border:1.5px solid var(--rose);color:var(--rose-dark);border-radius:20px;padding:7px 16px;font-size:.78rem;font-weight:600;cursor:pointer;width:100%;justify-content:center}
.andrea-dot{width:8px;height:8px;background:#f59e0b;border-radius:50%}

.email-gate{padding:24px 16px;display:flex;flex-direction:column;gap:16px;flex:1;justify-content:center}
.gate-step{display:none;flex-direction:column;gap:12px}
.gate-step.active{display:flex}
.gate-title{font-family:var(--font-display);font-size:1.1rem;color:var(--dark);text-align:center}
.email-field{border:1.5px solid var(--sand);border-radius:24px;padding:11px 18px;font-size:.875rem;text-align:center;width:100%;outline:none;background:var(--cream)}
.email-submit{background:linear-gradient(135deg,var(--rose-dark),var(--rose));color:white;border:none;border-radius:24px;padding:11px;font-size:.875rem;font-weight:600;cursor:pointer;width:100%}
.email-error{font-size:.75rem;color:#dc2626;text-align:center;display:none}

.source-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.source-btn{background:var(--white);border:1.5px solid var(--sand);border-radius:12px;padding:10px 8px;font-size:.78rem;cursor:pointer;text-align:center}
.source-btn.selected{border-color:var(--rose);background:var(--rose-light);color:var(--rose-dark);font-weight:600}
</style>
</head>
<body>

<div class="chat-widget" id="chatWidget">
  <div class="chat-header">
    <div class="avatar-wrap">🎁</div>
    <div class="chat-header-info">
      <strong id="agentNameDisplay">Sofía · De Moi à Toi</strong>
      <span>Aquí para ayudarte a encontrar el regalo perfecto ✨</span>
    </div>
    <div class="header-badge">En línea</div>
  </div>

  <div class="email-gate" id="emailGate">
    <div class="gate-step active" id="gateStep1">
      <div class="gate-title">¡Hola! Para comenzar introduce tu email 😊</div>
      <input class="email-field" type="email" id="emailInput" placeholder="tu@email.com" onkeydown="if(event.key==='Enter') goToStep2()">
      <button class="email-submit" onclick="goToStep2()">Continuar →</button>
      <div class="email-error" id="emailError">Por favor introduce un email válido</div>
    </div>
    <div class="gate-step" id="gateStep2">
      <div class="gate-title">¿Cómo nos conociste?</div>
      <div class="source-options">
        <button class="source-btn" onclick="selectSource(this,'Instagram')">📸 Instagram</button>
        <button class="source-btn" onclick="selectSource(this,'Google')">🔍 Google</button>
        <button class="source-btn" onclick="selectSource(this,'Recomendación')">💬 Recomendación</button>
        <button class="source-btn" onclick="selectSource(this,'Ya era clienta')">💛 Ya era clienta</button>
      </div>
      <button class="email-submit" id="sourceSubmit" onclick="submitSource()" style="opacity:.5;pointer-events:none">Empezar a chatear →</button>
    </div>
  </div>

  <div class="messages-area" id="messagesArea" style="display:none"></div>
  <div class="input-area" id="inputArea" style="display:none">
    <div class="input-row">
      <textarea class="chat-input" id="chatInput" placeholder="Escríbeme lo que necesitas..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="andrea-bar">
    <button class="andrea-btn" onclick="waitForAndrea()">
      <span class="andrea-dot"></span>Hablar con Andrea
    </button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tjsvgvcfddwbtnadxbhh.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqc3ZndmNmZGR3YnRuYWR4YmhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTMzMTYsImV4cCI6MjA5MzkyOTMxNn0.GtAOjajdcU1A_bSCGKuE3EyVKe5MTCk2dAytyu2s41g'

let _andreaActive = false;
let conversationHistory = [];
let isTyping = false;
let _selectedSource = null;

let agentConfig = {
  name: "Sofía",
  shipping: "Envío estándar: 3-5 días hábiles en España, 3,99€. Gratis a partir de 40€.",
  returns:  "Aceptamos devoluciones en 14 días si el producto llega defectuoso.",
  extra:    "Si el cliente tiene dudas sobre personalización, explica que lo hace nuestro equipo artesanal."
};

async function checkAndreaMessages() {
  if (!window._convId) return;
  try {
    const convRes = await fetch(`${SUPABASE_URL}/rest/v1/chat_conversations?id=eq.${window._convId}&select=status`, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
    });
    const convData = await convRes.json();
    if(convData?.[0]?.status === 'andrea_active') _andreaActive = true;
    if(convData?.[0]?.status === 'active') _andreaActive = false;

    const res = await fetch(`${SUPABASE_URL}/rest/v1/chat_messages?conversation_id=eq.${window._convId}&order=created_at.desc&limit=1`, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
    });
    const data = await res.json();
    if (data && data.length > 0) {
      const last = data[0];
      if (last.id !== window._lastAndreaId) {
        window._lastAndreaId = last.id;
        if (last.content === 'sofia_resume') {
          _andreaActive = false;
          renderBubble('agent', 'Hola de nuevo 😊 Andrea me ha pasado el testigo. ¿En qué más puedo ayudarte?');
        } else if (last.is_from_andrea) {
          renderAndreaBubble(last.content);
        } else if (last.role === 'assistant') {
          renderBubble('agent', last.content);
        }
      }
    }
  } catch(e) {}
}

function renderAndreaBubble(text) {
  const area = document.getElementById('messagesArea');
  const row = document.createElement('div');
  row.className = 'bubble-row agent';
  row.innerHTML = `
    <div class="bubble-avatar" style="background:linear-gradient(135deg,#fde8e6,#e8837a)">👩‍💼</div>
    <div>
      <div style="font-size:.65rem;color:var(--warm-gray);margin-bottom:3px">Andrea</div>
      <div class="bubble" style="background:linear-gradient(135deg,#c05a52,#e8837a);color:white">${text.split('\n').join('<br>')}</div>
      <div class="bubble-time">${getTime()}</div>
    </div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function getTime() { return new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}); }

function renderBubble(role, content) {
  const area = document.getElementById("messagesArea");
  const row = document.createElement("div");
  row.className = `bubble-row ${role}`;
  let cleanContent = content.replace(/PRODUCTOS_JSON:[\s\S]*$/, "").trim();
  
  row.innerHTML = `
    <div class="bubble-avatar">${role === "agent" ? "🎁" : "👤"}</div>
    <div>
      <div class="bubble">${cleanContent.replace(/\n/g, "<br>")}</div>
      <div class="bubble-time">${getTime()}</div>
    </div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function renderQuickReplies(replies) {
  const area = document.getElementById("messagesArea");
  const wrap = document.createElement("div");
  wrap.className = "quick-replies";
  wrap.id = "quickReplies";
  replies.forEach(r => {
    const btn = document.createElement("button");
    btn.className = "qr-btn";
    btn.textContent = r;
    btn.onclick = () => { wrap.remove(); sendUserMessage(r); };
    wrap.appendChild(btn);
  });
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  removeTyping();
  const area = document.getElementById("messagesArea");
  const row = document.createElement("div");
  row.className = "bubble-row agent";
  row.id = "typingRow";
  row.innerHTML = `<div class="bubble-avatar">🎁</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}
function removeTyping() { document.getElementById("typingRow")?.remove(); }

async function callAPI(userMsg) {
  conversationHistory.push({ role: "user", content: userMsg });
  const res = await fetch("https://demoiatoi-chat-agent.vercel.app/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      messages: conversationHistory,
      conversation_id: window._convId || null,
      customer_email: window._customerEmail || null,
      customer_source: window._customerSource || null,
      cfg_shipping: agentConfig.shipping,
      cfg_returns: agentConfig.returns,
      cfg_extra: agentConfig.extra,
      cfg_name: agentConfig.name
    })
  });
  if (!res.ok) throw new Error("API Error");
  const data = await res.json();
  const text = data.content?.[0]?.text || "Lo siento, ha habido un problema.";
  conversationHistory.push({ role: "assistant", content: text });
  return text;
}

async function sendUserMessage(text) {
  if (!text.trim() || isTyping) return;
  isTyping = true;
  document.getElementById("quickReplies")?.remove();
  renderBubble("user", text);
  document.getElementById("sendBtn").disabled = true;
  showTyping();
  try {
    const reply = await callAPI(text);
    removeTyping();
    if (!_andreaActive) renderBubble("agent", reply);
  } catch(e) {
    removeTyping();
    renderBubble("agent", "Lo siento, ha habido un problema de conexión con la IA. ¿Puedes repetir? 🙏");
  }
  document.getElementById("sendBtn").disabled = false;
  isTyping = false;
}

function sendMessage() { sendUserMessage(document.getElementById("chatInput").value.trim()); }
function handleKey(e) { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();} }

function goToStep2() {
  const email = document.getElementById('emailInput').value.trim();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('emailError').style.display = 'block';
    return;
  }
  window._customerEmail = email;
  document.getElementById('gateStep1').classList.remove('active');
  document.getElementById('gateStep2').classList.add('active');
}

function selectSource(btn, source) {
  _selectedSource = source;
  document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('sourceSubmit').style.opacity = '1';
  document.getElementById('sourceSubmit').style.pointerEvents = 'auto';
}

function submitSource() {
  const email = window._customerEmail;
  window._customerSource = _selectedSource;
  sessionStorage.setItem('dmat_email', email);
  showChat();
}

async function showChat() {
  document.getElementById('emailGate').style.display = 'none';
  document.getElementById('messagesArea').style.display = 'flex';
  document.getElementById('inputArea').style.display = 'block';
  
  const area = document.getElementById('messagesArea');
  area.innerHTML = "";
  
  if (window._convId) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/chat_messages?conversation_id=eq.${window._convId}&order=created_at.asc`, {
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
      });
      const msgs = await res.json();
      if (msgs && msgs.length > 0) {
        conversationHistory = msgs.map(m => ({ role: m.role, content: m.content }));
        msgs.forEach(m => {
          if (m.is_from_andrea) renderAndreaBubble(m.content);
          else renderBubble(m.role === 'user' ? 'user' : 'agent', m.content);
        });
        window._lastAndreaId = msgs[msgs.length - 1].id;
      }
    } catch(e) {}
  } else {
    renderBubble("agent", `¡Hola! 👋 Soy Sofía, tu asistente en De Moi à Toi Regalos. ¿Estás buscando algo especial para una celebración? 🎁`);
    renderQuickReplies(["🎁 Busco un regalo o detalle", "📦 Estado de mi pedido", "⚠️ Tengo una incidencia"]);
  }
  setInterval(checkAndreaMessages, 5000);
}

function initChat() {
  if (window._customerEmail) { showChat(); } else { document.getElementById('emailGate').style.display = 'flex'; }
}

function waitForAndrea() { renderBubble("agent", "¡Perfecto! 👩‍💼 Andrea ha sido alertada y se unirá en breves instantes."); }

window.addEventListener("DOMContentLoaded", () => {
  window._customerEmail = sessionStorage.getItem('dmat_email') || null;
  initChat();
});
</script>
</body>
</html>
