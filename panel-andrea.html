<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Andrea – De Moi à Toi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2c5f7a;--blue-light:#4a7fa5;--blue-pale:#dceaf3;--blue-dark:#1a3d52;
  --cream:#f0f5f9;--white:#fff;--sand:#e8f0f6;
  --green:#16a34a;--green-bg:#f0fdf4;
  --orange:#d97706;--orange-bg:#fffbeb;
  --red:#dc2626;--red-bg:#fef2f2;
  --warm:#6b8fa3;--dark:#1a2e3a;
  --shadow:0 4px 20px rgba(26,46,58,.1);
  --radius:14px;--radius-sm:8px;
  --font-d:'Playfair Display',serif;--font-b:'DM Sans',sans-serif;
}
body{font-family:var(--font-b);background:var(--cream);color:var(--dark);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.header{background:linear-gradient(135deg,var(--blue-dark),var(--blue));padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header h1{font-family:var(--font-d);color:white;font-size:1.1rem;flex:1}
.header h1 span{opacity:.7;font-size:.8rem;font-weight:400;font-style:italic}
.status-pill{background:rgba(255,255,255,.15);color:white;padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:600;display:flex;align-items:center;gap:5px}
.status-dot{width:6px;height:6px;background:#4ade80;border-radius:50%}
.header-stats{display:flex;gap:8px}
.hstat{background:rgba(255,255,255,.12);color:white;padding:4px 10px;border-radius:8px;font-size:.72rem;font-weight:600;text-align:center}
.hstat span{display:block;font-size:.65rem;opacity:.7;font-weight:400}
.notif-bell{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;position:relative}
.notif-count{position:absolute;top:-2px;right:-2px;background:#ef4444;color:white;font-size:.6rem;font-weight:700;width:15px;height:15px;border-radius:50%;display:none;align-items:center;justify-content:center}
.notif-count.show{display:flex}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:300px;background:var(--white);border-right:1.5px solid var(--sand);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-top{padding:12px;border-bottom:1.5px solid var(--sand)}
.search-box{width:100%;border:1.5px solid var(--sand);border-radius:20px;padding:7px 14px;font-size:.8rem;font-family:var(--font-b);outline:none;background:var(--cream);color:var(--dark);margin-bottom:8px}
.search-box:focus{border-color:var(--blue-light)}
.filter-tabs{display:flex;gap:5px}
.ftab{padding:4px 10px;border-radius:12px;font-size:.7rem;font-weight:600;border:none;cursor:pointer;font-family:var(--font-b);transition:.15s;flex:1;text-align:center}
.ftab.active{background:var(--blue);color:white}
.ftab:not(.active){background:var(--sand);color:var(--warm)}
.conv-list{flex:1;overflow-y:auto;padding:6px}
.conv-list::-webkit-scrollbar{width:3px}
.conv-list::-webkit-scrollbar-thumb{background:var(--blue-pale);border-radius:4px}

/* CONV ITEM */
.conv-item{padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:3px;border:1.5px solid transparent;position:relative;transition:.15s}
.conv-item:hover{background:var(--blue-pale)}
.conv-item.active{background:var(--blue-pale);border-color:var(--blue-light)}
.conv-item.needs-attention{border-left:3px solid var(--orange)}
.conv-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.conv-email{font-size:.8rem;font-weight:600;color:var(--dark);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-time{font-size:.65rem;color:var(--warm);flex-shrink:0}
.conv-preview{font-size:.73rem;color:var(--warm);line-height:1.35;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.conv-footer{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.badge{font-size:.62rem;padding:2px 6px;border-radius:8px;font-weight:600;white-space:nowrap}
.badge-attention{background:var(--orange-bg);color:var(--orange)}
.badge-active{background:var(--green-bg);color:var(--green)}
.badge-resolved{background:var(--sand);color:var(--warm)}
.badge-source{background:var(--blue-pale);color:var(--blue)}
.badge-rating{background:#fffbeb;color:#d97706}
.delete-conv-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--warm);cursor:pointer;font-size:.8rem;opacity:0;transition:.15s;padding:2px 5px;border-radius:4px}
.conv-item:hover .delete-conv-btn{opacity:1}
.delete-conv-btn:hover{background:var(--red-bg);color:var(--red)}

/* CHAT PANEL */
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* CHAT TOP */
.chat-top{padding:12px 20px;border-bottom:1.5px solid var(--sand);background:var(--white);display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-top-info{flex:1;min-width:0}
.chat-top-info h3{font-size:.9rem;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-top-info .meta{font-size:.72rem;color:var(--warm);display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.meta-tag{background:var(--sand);padding:2px 7px;border-radius:8px;font-size:.68rem}
.chat-actions{display:flex;gap:6px;flex-shrink:0}
.action-btn{padding:5px 12px;border-radius:16px;font-size:.72rem;font-weight:600;font-family:var(--font-b);cursor:pointer;border:none;transition:.15s;white-space:nowrap}
.btn-resolve{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green)}
.btn-resolve:hover{background:var(--green);color:white}
.btn-delete{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red)}
.btn-delete:hover{background:var(--red);color:white}

/* MESSAGES */
.messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.messages-area::-webkit-scrollbar{width:3px}
.messages-area::-webkit-scrollbar-thumb{background:var(--blue-pale);border-radius:4px}
.msg-row{display:flex;gap:8px;align-items:flex-end}
.msg-row.assistant,.msg-row.andrea{flex-direction:row-reverse}
.msg-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
.msg-avatar.user-av{background:var(--blue-pale)}
.msg-avatar.agent-av{background:linear-gradient(135deg,var(--blue-pale),var(--blue-light))}
.msg-avatar.andrea-av{background:linear-gradient(135deg,#fde8e6,#e8837a)}
.msg-wrap{max-width:72%}
.msg-label{font-size:.62rem;color:var(--warm);margin-bottom:2px}
.msg-row.assistant .msg-label,.msg-row.andrea .msg-label{text-align:right}
.msg-bubble{padding:9px 13px;border-radius:14px;font-size:.83rem;line-height:1.5}
.msg-row.user .msg-bubble{background:var(--sand);color:var(--dark);border-bottom-left-radius:3px}
.msg-row.assistant .msg-bubble{background:var(--blue-pale);color:var(--dark);border-bottom-right-radius:3px}
.msg-row.andrea .msg-bubble{background:linear-gradient(135deg,#c05a52,#e8837a);color:white;border-bottom-right-radius:3px}
.msg-time{font-size:.62rem;color:var(--warm);margin-top:3px}
.msg-row.assistant .msg-time,.msg-row.andrea .msg-time{text-align:right}

/* INPUT ANDREA */
.andrea-input-area{padding:12px 16px;background:var(--white);border-top:1.5px solid var(--sand);flex-shrink:0}
.andrea-label{font-size:.7rem;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.andrea-row{display:flex;gap:8px;align-items:flex-end}
.andrea-textarea{flex:1;border:1.5px solid var(--blue-pale);border-radius:10px;padding:9px 13px;font-size:.85rem;font-family:var(--font-b);color:var(--dark);background:var(--cream);outline:none;resize:none;min-height:40px;max-height:100px;line-height:1.5;transition:.2s}
.andrea-textarea:focus{border-color:var(--blue)}
.andrea-send{background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:white;border:none;border-radius:10px;padding:9px 16px;font-size:.8rem;font-weight:600;font-family:var(--font-b);cursor:pointer;flex-shrink:0;transition:.15s}
.andrea-send:hover{opacity:.9}
.andrea-send:disabled{opacity:.5;cursor:not-allowed}

/* NO SELECTION */
.no-selection{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--warm)}
.no-selection div:first-child{font-size:2.5rem}
.no-selection p{font-size:.85rem}

/* MODAL CONFIRM */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:9999}
.modal-overlay.show{display:flex}
.modal-box{background:white;border-radius:var(--radius);padding:24px;max-width:320px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-box h3{font-family:var(--font-d);font-size:1rem;margin-bottom:8px;color:var(--dark)}
.modal-box p{font-size:.82rem;color:var(--warm);margin-bottom:18px;line-height:1.5}
.modal-actions{display:flex;gap:8px}
.modal-btn{flex:1;padding:9px;border-radius:8px;border:none;font-size:.82rem;font-weight:600;font-family:var(--font-b);cursor:pointer}
.modal-btn-cancel{background:var(--sand);color:var(--warm)}
.modal-btn-confirm{background:var(--red);color:white}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--blue-dark);color:white;padding:10px 16px;border-radius:8px;font-size:.8rem;z-index:9999;display:none;box-shadow:var(--shadow)}
.toast.show{display:block}

/* EMPTY */
.empty-list{text-align:center;padding:30px 16px;color:var(--warm);font-size:.82rem}
.empty-list div{font-size:1.8rem;margin-bottom:6px}

/* LOGIN */
.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--blue-dark),var(--blue));display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:white;border-radius:var(--radius);padding:28px;width:300px;text-align:center}
.login-box h2{font-family:var(--font-d);font-size:1.3rem;margin-bottom:4px}
.login-box p{color:var(--warm);font-size:.82rem;margin-bottom:20px}
.login-input{width:100%;border:1.5px solid var(--sand);border-radius:8px;padding:10px 12px;font-size:.875rem;font-family:var(--font-b);outline:none;margin-bottom:10px}
.login-input:focus{border-color:var(--blue)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:white;border:none;border-radius:8px;padding:11px;font-size:.9rem;font-weight:600;font-family:var(--font-b);cursor:pointer}
.login-error{color:var(--red);font-size:.75rem;margin-top:6px;display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div style="font-size:2rem;margin-bottom:10px">🎁</div>
    <h2>Panel Andrea</h2>
    <p>De Moi à Toi Regalos</p>
    <input class="login-input" type="password" id="loginPass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="loginError">Contraseña incorrecta</div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>Panel de Control <span>De Moi à Toi</span></h1>
  <div class="header-stats">
    <div class="hstat" id="statTotal">0<span>Total</span></div>
    <div class="hstat" id="statAlert" style="color:#fbbf24">0<span>Alertas</span></div>
    <div class="hstat" id="statRating">–<span>⭐ Media</span></div>
  </div>
  <div class="status-pill"><div class="status-dot"></div>En vivo</div>
  <button class="notif-bell" id="notifBell">🔔<div class="notif-count" id="notifCount">0</div></button>
</div>

<!-- MAIN -->
<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-top">
      <input class="search-box" type="text" id="searchBox" placeholder="🔍 Buscar por email..." oninput="renderConvList()">
      <div class="filter-tabs">
        <button class="ftab active" onclick="setFilter('all',this)">Todas</button>
        <button class="ftab" onclick="setFilter('needs_review',this)">⚠️ Alertas</button>
        <button class="ftab" onclick="setFilter('active',this)">Activas</button>
        <button class="ftab" onclick="setFilter('resolved',this)">✅ Resueltas</button>
      </div>
    </div>
    <div class="conv-list" id="convList">
      <div class="empty-list"><div>💬</div>Cargando...</div>
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel">
    <div class="no-selection" id="noSelection">
      <div>👩‍💼</div>
      <p>Selecciona una conversación</p>
    </div>

    <div id="chatView" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div class="chat-top">
        <div class="chat-top-info">
          <h3 id="chatTitle">–</h3>
          <div class="meta" id="chatMeta"></div>
        </div>
        <div class="chat-actions">
          <button class="action-btn btn-resolve" onclick="resolveConv()">✅ Resolver</button>
          <button class="action-btn btn-delete" onclick="confirmDelete('conv')">🗑️ Borrar</button>
        </div>
      </div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="andrea-input-area">
        <div class="andrea-label">👩‍💼 Tu respuesta como Andrea</div>
        <div class="andrea-row">
          <textarea class="andrea-textarea" id="andreaInput" placeholder="Escribe tu respuesta al cliente..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAndrea()}"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
          <button class="andrea-send" id="andreaSendBtn" onclick="sendAndrea()">Enviar ✉️</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CONFIRM DELETE -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3 id="modalTitle">¿Borrar conversación?</h3>
    <p id="modalDesc">Esta acción no se puede deshacer.</p>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-btn modal-btn-confirm" id="modalConfirmBtn">Borrar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://tjsvgvcfddwbtnadxbhh.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqc3ZndmNmZGR3YnRuYWR4YmhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTMzMTYsImV4cCI6MjA5MzkyOTMxNn0.GtAOjajdcU1A_bSCGKuE3EyVKe5MTCk2dAytyu2s41g'
const PANEL_PASSWORD = 'demoiatoi2024'

// ── LOGIN ──
function doLogin() {
  if (document.getElementById('loginPass').value === PANEL_PASSWORD) {
    document.getElementById('loginOverlay').style.display = 'none'
    init()
  } else {
    document.getElementById('loginError').style.display = 'block'
  }
}

// ── SUPABASE ──
async function sb(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
      ...opts.headers
    }
  })
  if (!res.ok) return null
  const t = await res.text()
  return t ? JSON.parse(t) : null
}

// ── STATE ──
let conversations = []
let currentConvId = null
let currentFilter = 'all'
let prevAlertCount = 0

// ── INIT ──
async function init() {
  await loadConversations()
  setInterval(async () => {
    await loadConversations()
    if (currentConvId) await loadMessages(currentConvId)
  }, 5000)
}

// ── CARGAR CONVERSACIONES ──
async function loadConversations() {
  const data = await sb('chat_conversations?select=*&order=updated_at.desc')
  if (!data) return
  conversations = data

  // Stats
  const alerts = conversations.filter(c => c.needs_attention && c.status !== 'resolved').length
  const ratings = conversations.filter(c => c.rating).map(c => c.rating)
  const avgRating = ratings.length ? (ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1) : '–'

  document.getElementById('statTotal').innerHTML = `${conversations.length}<span>Total</span>`
  document.getElementById('statAlert').innerHTML = `${alerts}<span>Alertas</span>`
  document.getElementById('statRating').innerHTML = `${avgRating}<span>⭐ Media</span>`
  document.getElementById('notifCount').textContent = alerts
  document.getElementById('notifCount').classList.toggle('show', alerts > 0)

  if (alerts > prevAlertCount) playAlarm()
  prevAlertCount = alerts

  renderConvList()
}

// ── FILTRO ──
function setFilter(f, btn) {
  currentFilter = f
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  renderConvList()
}

// ── RENDER LISTA ──
function renderConvList() {
  const search = document.getElementById('searchBox').value.toLowerCase()
  let list = conversations

  if (currentFilter === 'needs_review') list = list.filter(c => c.needs_attention && c.status !== 'resolved')
  else if (currentFilter === 'active') list = list.filter(c => c.status === 'active')
  else if (currentFilter === 'resolved') list = list.filter(c => c.status === 'resolved')

  if (search) list = list.filter(c => (c.customer_email||'').toLowerCase().includes(search))

  const el = document.getElementById('convList')
  if (!list.length) {
    el.innerHTML = '<div class="empty-list"><div>✅</div>Sin conversaciones</div>'
    return
  }

  el.innerHTML = list.map(c => {
    const time = new Date(c.updated_at).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})
    const date = new Date(c.updated_at).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'})
    const isToday = new Date(c.updated_at).toDateString() === new Date().toDateString()
    const timeStr = isToday ? time : date

    const badge = c.needs_attention && c.status !== 'resolved'
      ? '<span class="badge badge-attention">⚠️ Atención</span>'
      : c.status === 'resolved'
      ? '<span class="badge badge-resolved">✅ Resuelta</span>'
      : '<span class="badge badge-active">● Activa</span>'

    const sourceBadge = c.customer_source ? `<span class="badge badge-source">${c.customer_source}</span>` : ''
    const ratingBadge = c.rating ? `<span class="badge badge-rating">${'⭐'.repeat(c.rating)}</span>` : ''

    return `<div class="conv-item ${c.needs_attention&&c.status!=='resolved'?'needs-attention':''} ${c.id===currentConvId?'active':''}"
      onclick="selectConv('${c.id}')">
      <button class="delete-conv-btn" onclick="event.stopPropagation();confirmDelete('${c.id}')" title="Borrar">🗑️</button>
      <div class="conv-item-header">
        <div class="conv-email">${c.customer_email || 'Cliente anónimo'}</div>
        <div class="conv-time">${timeStr}</div>
      </div>
      <div class="conv-preview" id="preview-${c.id}">–</div>
      <div class="conv-footer">${badge}${sourceBadge}${ratingBadge}</div>
    </div>`
  }).join('')
}

// ── SELECCIONAR ──
async function selectConv(id) {
  currentConvId = id
  const conv = conversations.find(c => c.id === id)
  document.getElementById('noSelection').style.display = 'none'
  document.getElementById('chatView').style.display = 'flex'

  document.getElementById('chatTitle').textContent = conv?.customer_email || `Cliente #${id.slice(-6).toUpperCase()}`

  const meta = []
  if (conv?.customer_source) meta.push(`<span class="meta-tag">📍 ${conv.customer_source}</span>`)
  if (conv?.rating) meta.push(`<span class="meta-tag">${'⭐'.repeat(conv.rating)} ${conv.rating}/5</span>`)
  if (conv?.rating_comment) meta.push(`<span class="meta-tag">💬 "${conv.rating_comment}"</span>`)
  if (conv?.needs_attention) meta.push(`<span class="meta-tag" style="color:var(--orange)">⚠️ Necesita atención</span>`)
  document.getElementById('chatMeta').innerHTML = meta.join('')

  renderConvList()
  await loadMessages(id)
  await sb(`chat_conversations?id=eq.${id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({unread:false}) })
}

// ── MENSAJES ──
async function loadMessages(convId) {
  const data = await sb(`chat_messages?conversation_id=eq.${convId}&order=created_at.asc`)
  if (!data) return
  renderMessages(data)

  // Actualizar preview
  const lastUser = [...data].reverse().find(m => m.role === 'user')
  if (lastUser) {
    const p = document.getElementById(`preview-${convId}`)
    if (p) p.textContent = lastUser.content.slice(0,70)
  }
}

function renderMessages(messages) {
  const area = document.getElementById('messagesArea')
  const atBottom = area.scrollHeight - area.clientHeight <= area.scrollTop + 60

  area.innerHTML = messages.map(m => {
    const time = new Date(m.created_at).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})
    const isAndrea = m.is_from_andrea
    const role = isAndrea ? 'andrea' : m.role
    const avatar = isAndrea ? '👩‍💼' : m.role==='user' ? '👤' : '🎁'
    const avClass = isAndrea ? 'andrea-av' : m.role==='user' ? 'user-av' : 'agent-av'
    const label = isAndrea ? 'Andrea' : m.role==='user' ? 'Cliente' : 'Sofía (IA)'
    const clean = m.content.replace(/PRODUCTOS_JSON:[\s\S]*$/,'').replace(/\n/g,'<br>')
    return `<div class="msg-row ${role}">
      <div class="msg-avatar ${avClass}">${avatar}</div>
      <div class="msg-wrap">
        <div class="msg-label">${label}</div>
        <div class="msg-bubble">${clean}</div>
        <div class="msg-time">${time}</div>
      </div>
    </div>`
  }).join('')

  if (atBottom) area.scrollTop = area.scrollHeight
}

// ── ENVIAR ANDREA ──
async function sendAndrea() {
  const input = document.getElementById('andreaInput')
  const text = input.value.trim()
  if (!text || !currentConvId) return
  document.getElementById('andreaSendBtn').disabled = true
  input.value = ''; input.style.height = ''

  await sb('chat_messages', {
    method:'POST', prefer:'return=minimal',
    body: JSON.stringify({ conversation_id: currentConvId, role:'assistant', content: text, is_from_andrea: true })
  })
  await sb(`chat_conversations?id=eq.${currentConvId}`, {
    method:'PATCH', prefer:'return=minimal',
    body: JSON.stringify({ needs_attention: false, status:'active', updated_at: new Date().toISOString() })
  })
  await loadMessages(currentConvId)
  await loadConversations()
  document.getElementById('andreaSendBtn').disabled = false
  showToast('✅ Mensaje enviado')
}

// ── RESOLVER ──
async function resolveConv() {
  if (!currentConvId) return
  await sb(`chat_conversations?id=eq.${currentConvId}`, {
    method:'PATCH', prefer:'return=minimal',
    body: JSON.stringify({ status:'resolved', needs_attention: false })
  })
  await loadConversations()
  showToast('✅ Conversación resuelta')
}

// ── BORRAR ──
let _deleteTarget = null

function confirmDelete(id) {
  _deleteTarget = id === 'conv' ? currentConvId : id
  if (!_deleteTarget) return
  const conv = conversations.find(c => c.id === _deleteTarget)
  document.getElementById('modalTitle').textContent = '¿Borrar conversación?'
  document.getElementById('modalDesc').textContent = `Se borrará la conversación de ${conv?.customer_email || 'este cliente'} y todos sus mensajes. No se puede deshacer.`
  document.getElementById('modalConfirmBtn').onclick = doDelete
  document.getElementById('modalOverlay').classList.add('show')
}

async function doDelete() {
  closeModal()
  if (!_deleteTarget) return
  await sb(`chat_messages?conversation_id=eq.${_deleteTarget}`, { method:'DELETE', prefer:'return=minimal' })
  await sb(`chat_conversations?id=eq.${_deleteTarget}`, { method:'DELETE', prefer:'return=minimal' })
  if (_deleteTarget === currentConvId) {
    currentConvId = null
    document.getElementById('noSelection').style.display = 'flex'
    document.getElementById('chatView').style.display = 'none'
  }
  await loadConversations()
  showToast('🗑️ Conversación borrada')
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show') }

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 3000)
}

// ── ALARMA ──
function playAlarm() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)()
    const beep = (f,s,d) => {
      const o = ctx.createOscillator(), g = ctx.createGain()
      o.connect(g); g.connect(ctx.destination)
      o.frequency.value = f; o.type = 'sine'
      g.gain.setValueAtTime(0.35, ctx.currentTime+s)
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+s+d)
      o.start(ctx.currentTime+s); o.stop(ctx.currentTime+s+d)
    }
    beep(880,0,.15); beep(880,.2,.15); beep(1100,.4,.25)
  } catch(e) {}
}
