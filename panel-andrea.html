<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Andrea – De Moi à Toi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2c5f7a;--blue-light:#4a7fa5;--blue-pale:#dceaf3;--blue-dark:#1a3d52;
  --cream:#f0f5f9;--white:#fff;--sand:#e8f0f6;
  --green:#16a34a;--green-bg:#f0fdf4;
  --orange:#d97706;--orange-bg:#fffbeb;
  --red:#dc2626;--red-bg:#fef2f2;
  --warm:#6b8fa3;--dark:#1a2e3a;
  --shadow:0 4px 20px rgba(26,46,58,.1);
  --radius:14px;--radius-sm:8px;
  --font-d:'Playfair Display',serif;--font-b:'DM Sans',sans-serif;
}
body{font-family:var(--font-b);background:var(--cream);color:var(--dark);height:100vh;display:flex;flex-direction:column;overflow:hidden}

.header{background:linear-gradient(135deg,var(--blue-dark),var(--blue));padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header h1{font-family:var(--font-d);color:white;font-size:1.1rem;flex:1}
.status-pill{background:#4ade80;color:var(--dark);padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:600}

.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:300px;background:var(--white);border-right:1.5px solid var(--sand);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-top{padding:12px;border-bottom:1.5px solid var(--sand)}
.search-box{width:100%;border:1.5px solid var(--sand);border-radius:20px;padding:7px 14px;font-size:.8rem;background:var(--cream);outline:none}
.filter-tabs{display:flex;gap:5px}
.ftab{padding:6px;border-radius:12px;font-size:.7rem;font-weight:600;border:none;cursor:pointer;flex:1;background:var(--sand);color:var(--warm)}
.ftab.active{background:var(--blue);color:white}
.conv-list{flex:1;overflow-y:auto;padding:6px}

.conv-item{padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:3px;border:1.5px solid transparent;position:relative}
.conv-item.active{background:var(--blue-pale);border-color:var(--blue-light)}
.conv-email{font-size:.8rem;font-weight:600}
.conv-preview{font-size:.73rem;color:var(--warm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.no-selection{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--warm)}
.chat-top{padding:12px 20px;border-bottom:1.5px solid var(--sand);background:var(--white);display:flex;align-items:center;justify-content:between}
.messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:var(--cream)}

.msg-row{display:flex;gap:8px;margin-bottom:8px}
.msg-row.assistant{flex-direction:row-reverse}
.msg-bubble{padding:9px 13px;border-radius:14px;font-size:.83rem;max-width:70%;line-height:1.4}
.msg-row.user .msg-bubble{background:var(--white);color:var(--dark)}
.msg-row.assistant .msg-bubble{background:var(--blue-pale);color:var(--dark)}

.andrea-input-area{padding:12px 16px;background:var(--white);border-top:1.5px solid var(--sand)}
.andrea-row{display:flex;gap:8px}
.andrea-textarea{flex:1;border:1.5px solid var(--blue-pale);border-radius:10px;padding:9px;outline:none;resize:none}
.andrea-send{background:var(--blue);color:white;border:none;padding:9px 16px;border-radius:10px;cursor:pointer}

.login-overlay{position:fixed;inset:0;background:var(--blue-dark);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:white;padding:28px;border-radius:var(--radius);text-align:center}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>Panel Andrea</h2>
    <input type="password" id="loginPass" style="margin:10px 0;padding:8px;" placeholder="Contraseña">
    <button onclick="doLogin()" style="padding:8px 16px;cursor:pointer">Entrar</button>
  </div>
</div>

<div class="header">
  <h1 style="color:white">Panel de Control De Moi à Toi</h1>
  <div class="status-pill">En vivo</div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-top">
      <input class="search-box" type="text" id="searchBox" placeholder="Buscar email..." oninput="renderConvList()">
    </div>
    <div class="conv-list" id="convList"></div>
  </div>

  <div class="chat-panel">
    <div class="no-selection" id="noSelection">💬 Selecciona una conversación</div>
    <div id="chatView" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div class="chat-top">
        <h3 id="chatTitle">Email</h3>
        <button onclick="resolveConv()" style="padding:6px;cursor:pointer">✅ Resolver</button>
      </div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="andrea-input-area">
        <div class="andrea-row">
          <textarea class="andrea-textarea" id="andreaInput" placeholder="Escribe al cliente..."></textarea>
          <button class="andrea-send" onclick="sendAndrea()">Enviar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tjsvgvcfddwbtnadxbhh.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqc3ZndmNmZGR3YnRuYWR4YmhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTMzMTYsImV4cCI6MjA5MzkyOTMxNn0.GtAOjajdcU1A_bSCGKuE3EyVKe5MTCk2dAytyu2s41g'

function doLogin() {
  if (document.getElementById('loginPass').value === 'demoiatoi2024') {
    document.getElementById('loginOverlay').style.display = 'none';
    init();
  }
}

async function sb(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json', ...opts.headers }
  });
  return res.ok ? await res.json() : [];
}

let conversations = [];
let currentConvId = null;

async function init() {
  await loadConversations();
  setInterval(loadConversations, 5000);
}

async function loadConversations() {
  conversations = await sb('chat_conversations?select=*&order=updated_at.desc');
  renderConvList();
  if (currentConvId) loadMessages(currentConvId);
}

function renderConvList() {
  const el = document.getElementById('convList');
  el.innerHTML = conversations.map(c => `
    <div class="conv-item ${c.id === currentConvId ? 'active' : ''}" onclick="selectConv('${c.id}')">
      <div class="conv-email">${c.customer_email || 'Cliente Anónimo'}</div>
      <div class="conv-preview">${c.status || 'activa'}</div>
    </div>
  `).join('');
}

async function selectConv(id) {
  currentConvId = id;
  const conv = conversations.find(c => c.id === id);
  document.getElementById('noSelection').style.display = 'none';
  document.getElementById('chatView').style.display = 'flex';
  document.getElementById('chatTitle').textContent = conv.customer_email || 'Cliente';
  loadMessages(id);
}

async function loadMessages(convId) {
  const messages = await sb(`chat_messages?conversation_id=eq.${convId}&order=created_at.asc`);
  const area = document.getElementById('messagesArea');
  area.innerHTML = messages.map(m => `
    <div class="msg-row ${m.role === 'user' ? 'user' : 'assistant'}">
      <div class="msg-bubble">${m.content}</div>
    </div>
  `).join('');
}

async function sendAndrea() {
  const input = document.getElementById('andreaInput');
  const text = input.value.trim();
  if (!text || !currentConvId) return;
  
  await fetch(`${SUPABASE_URL}/rest/v1/chat_messages`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ conversation_id: currentConvId, role: 'assistant', content: text, is_from_andrea: true })
  });
  
  input.value = '';
  loadMessages(currentConvId);
}

async function resolveConv() {
  if (!currentConvId) return;
  await fetch(`${SUPABASE_URL}/rest/v1/chat_conversations?id=eq.${currentConvId}`, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: 'resolved' })
  });
  loadConversations();
}
</script>
</body>
</html>
