<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Andrea – De Moi à Toi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2c5f7a;--blue-light:#4a7fa5;--blue-pale:#dceaf3;--blue-dark:#1a3d52;
  --cream:#f0f5f9;--white:#fff;--sand:#e8f0f6;
  --green:#16a34a;--green-bg:#f0fdf4;
  --orange:#d97706;--orange-bg:#fffbeb;
  --red:#dc2626;--red-bg:#fef2f2;
  --warm:#6b8fa3;--dark:#1a2e3a;
  --shadow:0 4px 20px rgba(26,46,58,.1);
  --radius:14px;--radius-sm:8px;
  --font-d:'Playfair Display',serif;--font-b:'DM Sans',sans-serif;
}
body{font-family:var(--font-b);background:var(--cream);color:var(--dark);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.header{background:linear-gradient(135deg,var(--blue-dark),var(--blue));padding:14px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.header h1{font-family:var(--font-d);color:white;font-size:1.2rem;flex:1}
.header h1 span{opacity:.7;font-size:.85rem;font-weight:400;font-style:italic}
.status-pill{background:rgba(255,255,255,.15);color:white;padding:5px 14px;border-radius:20px;font-size:.75rem;font-weight:600;display:flex;align-items:center;gap:6px}
.status-dot{width:7px;height:7px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.notif-bell{background:rgba(255,255,255,.15);border:none;color:white;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;position:relative;transition:.2s}
.notif-bell:hover{background:rgba(255,255,255,.25)}
.notif-count{position:absolute;top:-2px;right:-2px;background:#ef4444;color:white;font-size:.6rem;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;display:none}
.notif-count.show{display:flex}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:320px;background:var(--white);border-right:1.5px solid var(--sand);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1.5px solid var(--sand);display:flex;align-items:center;gap:10px}
.sidebar-header h2{font-size:.9rem;font-weight:600;color:var(--dark);flex:1}
.filter-tabs{display:flex;gap:6px}
.ftab{padding:4px 10px;border-radius:12px;font-size:.72rem;font-weight:600;border:none;cursor:pointer;font-family:var(--font-b);transition:.15s}
.ftab.active{background:var(--blue);color:white}
.ftab:not(.active){background:var(--sand);color:var(--warm)}
.conv-list{flex:1;overflow-y:auto;padding:8px}
.conv-list::-webkit-scrollbar{width:4px}
.conv-list::-webkit-scrollbar-thumb{background:var(--blue-pale);border-radius:4px}
.conv-item{padding:12px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:4px;transition:.15s;border:1.5px solid transparent;position:relative}
.conv-item:hover{background:var(--blue-pale)}
.conv-item.active{background:var(--blue-pale);border-color:var(--blue-light)}
.conv-item.needs-attention{border-left:3px solid var(--orange)}
.conv-item.unread::after{content:'';position:absolute;top:12px;right:12px;width:8px;height:8px;background:var(--blue);border-radius:50%}
.conv-name{font-size:.85rem;font-weight:600;color:var(--dark);margin-bottom:3px}
.conv-preview{font-size:.75rem;color:var(--warm);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.conv-meta{display:flex;align-items:center;gap:6px;margin-top:5px}
.conv-time{font-size:.68rem;color:var(--warm)}
.conv-badge{font-size:.65rem;padding:2px 7px;border-radius:10px;font-weight:600}
.badge-attention{background:var(--orange-bg);color:var(--orange)}
.badge-active{background:var(--green-bg);color:var(--green)}
.badge-resolved{background:var(--sand);color:var(--warm)}
.empty-state{text-align:center;padding:40px 20px;color:var(--warm);font-size:.85rem}
.empty-state div{font-size:2rem;margin-bottom:8px}

/* CHAT PANEL */
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-top{padding:16px 20px;border-bottom:1.5px solid var(--sand);background:var(--white);display:flex;align-items:center;gap:12px}
.chat-top-info{flex:1}
.chat-top-info h3{font-size:.95rem;font-weight:600;color:var(--dark)}
.chat-top-info span{font-size:.75rem;color:var(--warm)}
.chat-actions{display:flex;gap:8px}
.action-btn{padding:6px 14px;border-radius:20px;font-size:.75rem;font-weight:600;font-family:var(--font-b);cursor:pointer;border:none;transition:.15s}
.btn-resolve{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green)}
.btn-resolve:hover{background:var(--green);color:white}
.btn-attention{background:var(--orange-bg);color:var(--orange);border:1.5px solid var(--orange)}

/* MESSAGES */
.messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.messages-area::-webkit-scrollbar{width:4px}
.messages-area::-webkit-scrollbar-thumb{background:var(--blue-pale);border-radius:4px}
.msg-row{display:flex;gap:8px;align-items:flex-end;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-row.user{flex-direction:row}
.msg-row.assistant{flex-direction:row-reverse}
.msg-row.andrea{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.msg-avatar.user-av{background:var(--blue-pale)}
.msg-avatar.agent-av{background:linear-gradient(135deg,var(--blue-pale),var(--blue-light));color:white}
.msg-avatar.andrea-av{background:linear-gradient(135deg,#fde8e6,#e8837a);color:white}
.msg-bubble{max-width:70%;padding:10px 14px;border-radius:16px;font-size:.85rem;line-height:1.55}
.msg-row.user .msg-bubble{background:var(--sand);color:var(--dark);border-bottom-left-radius:4px}
.msg-row.assistant .msg-bubble{background:var(--blue-pale);color:var(--dark);border-bottom-right-radius:4px}
.msg-row.andrea .msg-bubble{background:linear-gradient(135deg,#c05a52,#e8837a);color:white;border-bottom-right-radius:4px}
.msg-time{font-size:.63rem;color:var(--warm);margin-top:3px;text-align:right}
.msg-label{font-size:.65rem;color:var(--warm);margin-bottom:2px;text-align:right}

/* INPUT ANDREA */
.andrea-input-area{padding:16px 20px;background:var(--white);border-top:1.5px solid var(--sand);flex-shrink:0}
.andrea-label{font-size:.72rem;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.andrea-label::before{content:'👩‍💼';font-size:.9rem}
.andrea-row{display:flex;gap:10px;align-items:flex-end}
.andrea-textarea{flex:1;border:1.5px solid var(--blue-pale);border-radius:12px;padding:10px 14px;font-size:.875rem;font-family:var(--font-b);color:var(--dark);background:var(--cream);outline:none;resize:none;min-height:42px;max-height:120px;line-height:1.5;transition:.2s}
.andrea-textarea:focus{border-color:var(--blue)}
.andrea-send{background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:white;border:none;border-radius:10px;padding:10px 18px;font-size:.82rem;font-weight:600;font-family:var(--font-b);cursor:pointer;flex-shrink:0;transition:.15s}
.andrea-send:hover{opacity:.9;transform:translateY(-1px)}
.andrea-send:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* NO SELECTION */
.no-selection{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--warm)}
.no-selection div:first-child{font-size:3rem}
.no-selection p{font-size:.9rem}

/* NOTIFICATION */
.notif-toast{position:fixed;top:70px;right:20px;background:var(--blue-dark);color:white;padding:12px 18px;border-radius:var(--radius-sm);box-shadow:var(--shadow);font-size:.82rem;max-width:280px;z-index:9999;animation:slideIn .3s ease;display:none}
.notif-toast.show{display:block}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* LOGIN */
.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--blue-dark),var(--blue));display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:white;border-radius:var(--radius);padding:32px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h2{font-family:var(--font-d);font-size:1.4rem;margin-bottom:6px;color:var(--dark)}
.login-box p{color:var(--warm);font-size:.85rem;margin-bottom:24px}
.login-input{width:100%;border:1.5px solid var(--sand);border-radius:var(--radius-sm);padding:10px 14px;font-size:.875rem;font-family:var(--font-b);outline:none;margin-bottom:12px;transition:.2s}
.login-input:focus{border-color:var(--blue)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:white;border:none;border-radius:var(--radius-sm);padding:12px;font-size:.9rem;font-weight:600;font-family:var(--font-b);cursor:pointer}
.login-error{color:var(--red);font-size:.78rem;margin-top:8px;display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div style="font-size:2.5rem;margin-bottom:12px">🎁</div>
    <h2>Panel Andrea</h2>
    <p>De Moi à Toi Regalos</p>
    <input class="login-input" type="password" id="loginPass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="loginError">Contraseña incorrecta</div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>Panel de Control <span>De Moi à Toi Regalos</span></h1>
  <div class="status-pill"><div class="status-dot"></div>En vivo</div>
  <button class="notif-bell" id="notifBell" title="Notificaciones">
    🔔
    <div class="notif-count" id="notifCount">0</div>
  </button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Conversaciones</h2>
      <div class="filter-tabs">
        <button class="ftab active" onclick="filterConvs('all',this)">Todas</button>
        <button class="ftab" onclick="filterConvs('needs_review',this)">⚠️ Alertas</button>
        <button class="ftab" onclick="filterConvs('active',this)">Activas</button>
      </div>
    </div>
    <div class="conv-list" id="convList">
      <div class="empty-state"><div>💬</div>Cargando conversaciones...</div>
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel" id="chatPanel">
    <div class="no-selection" id="noSelection">
      <div>👩‍💼</div>
      <p>Selecciona una conversación para verla</p>
    </div>

    <div id="chatView" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div class="chat-top">
        <div class="chat-top-info">
          <h3 id="chatTitle">Cliente</h3>
          <span id="chatSubtitle">Conversación activa</span>
        </div>
        <div class="chat-actions">
          <button class="action-btn btn-resolve" onclick="resolveConv()">✅ Resolver</button>
        </div>
      </div>

      <div class="messages-area" id="messagesArea"></div>

      <div class="andrea-input-area">
        <div class="andrea-label">Tu respuesta como Andrea</div>
        <div class="andrea-row">
          <textarea class="andrea-textarea" id="andreaInput" placeholder="Escribe tu respuesta al cliente..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAndrea()}"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
          <button class="andrea-send" id="andreaSendBtn" onclick="sendAndrea()">Enviar ✉️</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="notif-toast" id="notifToast"></div>

<script>
// ═══════════════════════════════════════════
//  CONFIG — cambia estos valores
// ═══════════════════════════════════════════
const SUPABASE_URL = 'https://tjsvgvcfddwbtnadxbhh.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqc3ZndmNmZGR3YnRuYWR4YmhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTMzMTYsImV4cCI6MjA5MzkyOTMxNn0.GtAOjajdcU1A_bSCGKuE3EyVKe5MTCk2dAytyu2s41g'
const PANEL_PASSWORD = 'demoiatoi2018' // cambia esta contraseña

// ═══════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════
function doLogin() {
  const pass = document.getElementById('loginPass').value
  if (pass === PANEL_PASSWORD) {
    document.getElementById('loginOverlay').style.display = 'none'
    init()
  } else {
    document.getElementById('loginError').style.display = 'block'
  }
}

// ═══════════════════════════════════════════
//  SUPABASE CLIENT
// ═══════════════════════════════════════════
async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || '',
      ...options.headers
    }
  })
  if (!res.ok) return null
  const text = await res.text()
  return text ? JSON.parse(text) : null
}

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let conversations = []
let currentConvId = null
let currentFilter = 'all'
let pollInterval = null
let attentionCount = 0

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
async function init() {
  await loadConversations()
  // Polling cada 5 segundos
  pollInterval = setInterval(async () => {
    await loadConversations()
    if (currentConvId) await loadMessages(currentConvId)
  }, 5000)
}

// ═══════════════════════════════════════════
//  CARGAR CONVERSACIONES
// ═══════════════════════════════════════════
async function loadConversations() {
  const data = await sbFetch('chat_conversations?select=*&order=updated_at.desc')
  if (!data) return
  conversations = data

  // Contar alertas
  const prev = attentionCount
  attentionCount = conversations.filter(c => c.needs_attention && c.status !== 'resolved').length
  document.getElementById('notifCount').textContent = attentionCount
  document.getElementById('notifCount').classList.toggle('show', attentionCount > 0)

  // Mostrar notificación si hay nueva alerta
  if (attentionCount > prev) showToast('⚠️ Nueva conversación necesita tu atención')

  renderConvList()
}

// ═══════════════════════════════════════════
//  RENDER LISTA
// ═══════════════════════════════════════════
function filterConvs(filter, btn) {
  currentFilter = filter
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  renderConvList()
}

function renderConvList() {
  const list = document.getElementById('convList')
  let filtered = conversations
  if (currentFilter === 'needs_review') filtered = conversations.filter(c => c.needs_attention && c.status !== 'resolved')
  if (currentFilter === 'active') filtered = conversations.filter(c => c.status === 'active')

  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div>✅</div>Sin conversaciones en este filtro</div>'
    return
  }

  list.innerHTML = filtered.map(c => {
    const time = new Date(c.updated_at).toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'})
    const date = new Date(c.updated_at).toLocaleDateString('es-ES', {day:'2-digit',month:'2-digit'})
    const badge = c.needs_attention && c.status !== 'resolved'
      ? '<span class="conv-badge badge-attention">⚠️ Atención</span>'
      : c.status === 'resolved'
      ? '<span class="conv-badge badge-resolved">✅ Resuelta</span>'
      : '<span class="conv-badge badge-active">● Activa</span>'

    return `<div class="conv-item ${c.needs_attention && c.status!=='resolved' ? 'needs-attention' : ''} ${c.id===currentConvId?'active':''}"
      onclick="selectConv('${c.id}')">
      <div class="conv-name">Cliente #${c.id.slice(-6).toUpperCase()}</div>
      <div class="conv-preview">${c.customer_info || 'Sin mensajes aún'}</div>
      <div class="conv-meta">${badge}<span class="conv-time">${date} ${time}</span></div>
    </div>`
  }).join('')
}

// ═══════════════════════════════════════════
//  SELECCIONAR CONVERSACIÓN
// ═══════════════════════════════════════════
async function selectConv(id) {
  currentConvId = id
  const conv = conversations.find(c => c.id === id)
  document.getElementById('noSelection').style.display = 'none'
  document.getElementById('chatView').style.display = 'flex'
  document.getElementById('chatTitle').textContent = `Cliente #${id.slice(-6).toUpperCase()}`
  document.getElementById('chatSubtitle').textContent = conv?.needs_attention ? '⚠️ Necesita tu atención' : 'Conversación activa'
  renderConvList()
  await loadMessages(id)

  // Marcar como leída
  await sbFetch(`chat_conversations?id=eq.${id}`, {
    method: 'PATCH',
    prefer: 'return=minimal',
    body: JSON.stringify({ unread: false })
  })
}

// ═══════════════════════════════════════════
//  CARGAR MENSAJES
// ═══════════════════════════════════════════
async function loadMessages(convId) {
  const data = await sbFetch(`chat_messages?conversation_id=eq.${convId}&order=created_at.asc`)
  if (!data) return
  renderMessages(data)
}

function renderMessages(messages) {
  const area = document.getElementById('messagesArea')
  const wasAtBottom = area.scrollHeight - area.clientHeight <= area.scrollTop + 50

  area.innerHTML = messages.map(m => {
    const time = new Date(m.created_at).toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'})
    const isAndrea = m.is_from_andrea
    const roleClass = isAndrea ? 'andrea' : m.role === 'user' ? 'user' : 'assistant'
    const avatar = isAndrea ? '👩‍💼' : m.role === 'user' ? '👤' : '🎁'
    const avatarClass = isAndrea ? 'andrea-av' : m.role === 'user' ? 'user-av' : 'agent-av'
    const label = isAndrea ? 'Andrea' : m.role === 'user' ? 'Cliente' : 'Sofía (IA)'

    return `<div class="msg-row ${roleClass}">
      <div class="msg-avatar ${avatarClass}">${avatar}</div>
      <div>
        <div class="msg-label">${label}</div>
        <div class="msg-bubble">${m.content.replace(/\n/g,'<br>').replace(/PRODUCTOS_JSON:.*$/s,'')}</div>
        <div class="msg-time">${time}</div>
      </div>
    </div>`
  }).join('')

  if (wasAtBottom) area.scrollTop = area.scrollHeight
}

// ═══════════════════════════════════════════
//  ENVIAR MENSAJE COMO ANDREA
// ═══════════════════════════════════════════
async function sendAndrea() {
  const input = document.getElementById('andreaInput')
  const text = input.value.trim()
  if (!text || !currentConvId) return

  document.getElementById('andreaSendBtn').disabled = true
  input.value = ''
  input.style.height = ''

  await sbFetch('chat_messages', {
    method: 'POST',
    prefer: 'return=minimal',
    body: JSON.stringify({
      conversation_id: currentConvId,
      role: 'assistant',
      content: text,
      is_from_andrea: true
    })
  })

  await sbFetch(`chat_conversations?id=eq.${currentConvId}`, {
    method: 'PATCH',
    prefer: 'return=minimal',
    body: JSON.stringify({ needs_attention: false, status: 'active', updated_at: new Date().toISOString() })
  })

  await loadMessages(currentConvId)
  await loadConversations()
  document.getElementById('andreaSendBtn').disabled = false
}

// ═══════════════════════════════════════════
//  RESOLVER CONVERSACIÓN
// ═══════════════════════════════════════════
async function resolveConv() {
  if (!currentConvId) return
  await sbFetch(`chat_conversations?id=eq.${currentConvId}`, {
    method: 'PATCH',
    prefer: 'return=minimal',
    body: JSON.stringify({ status: 'resolved', needs_attention: false })
  })
  await loadConversations()
  showToast('✅ Conversación marcada como resuelta')
}

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
function showToast(msg) {
  const toast = document.getElementById('notifToast')
  toast.textContent = msg
  toast.classList.add('show')
  setTimeout(() => toast.classList.remove('show'), 4000)
}

function playAlarm() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)()
    const playBeep = (freq, start, duration) => {
      const osc = ctx.createOscillator()
      const gain = ctx.createGain()
      osc.connect(gain)
      gain.connect(ctx.destination)
      osc.frequency.value = freq
      osc.type = 'sine'
      gain.gain.setValueAtTime(0.4, ctx.currentTime + start)
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + duration)
      osc.start(ctx.currentTime + start)
      osc.stop(ctx.currentTime + start + duration)
    }
    // 3 pitidos
    playBeep(880, 0,    0.15)
    playBeep(880, 0.2,  0.15)
    playBeep(1100, 0.4, 0.25)
  } catch(e) {}
}
</script>
</body>
</html>
